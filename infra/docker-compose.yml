services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 5368709120
      KAFKA_LOG_SEGMENT_BYTES: 268435456
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_NUM_PARTITIONS: 30
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    hostname: redpanda-console
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
  postgres:
    image: postgres:15
    command: postgres -c max_connections=300
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    restart: unless-stopped

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-setup
    depends_on:
      - kafka
    command: >
      bash -c "
        echo 'Aguardando o Kafka...'
        cub kafka-ready -b kafka:29092 1 30
        echo 'Criando tópicos...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic kafka-topic-encargos-nao-iniciados --partitions 30 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic kafka-topic-status-conta-request --partitions 30 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic kafka-topic-status-conta-response --partitions 30 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic kafka-topic-encargos-processados --partitions 30 --replication-factor 1
        echo 'Tópicos criados!'
      "

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/targets.json:/etc/prometheus/targets.json
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
